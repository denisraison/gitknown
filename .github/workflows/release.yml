name: Release

# Cut a release by pushing a version tag: `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload binaries

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: macos-latest # Apple Silicon
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the tag history so `just build`'s `git describe` stamps the version

      # Same flake toolchain as dev + CI, so the released binary is built the
      # way `just build` builds it locally (incl. the darwin cgo/FSEvents path).
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build frontend + embedding binary
        run: |
          nix develop --command just deps
          nix develop --command just build
          echo "built version: $(./gitknown --version)"

      # The darwin build runs in the nix shell with cgo on (rjeczalik/notify
      # links CoreServices/FSEvents), so Go's cgo net resolver links libresolv
      # too, and the linker bakes nix's /nix/store/...-libresolv install name
      # into the binary. That path only exists on machines with nix, so the
      # tarball won't launch on a plain Mac. Repoint it to the system libresolv
      # (served from the dyld shared cache, same as a non-nix `go build`) and
      # re-sign, since install_name_tool invalidates the ad-hoc signature.
      - name: Make darwin binary portable (strip nix store paths)
        if: matrix.os == 'darwin'
        run: |
          old=$(otool -L gitknown | grep -o '/nix/store/[^ ]*libresolv[^ ]*\.dylib' || true)
          if [ -n "$old" ]; then
            install_name_tool -change "$old" /usr/lib/libresolv.9.dylib gitknown
            codesign -f -s - gitknown
          fi
          # Gate: nothing under /nix/store may remain, or the tarball isn't portable.
          if otool -L gitknown | grep -q /nix/store; then
            echo "::error::darwin binary still references /nix/store:"
            otool -L gitknown
            exit 1
          fi
          ./gitknown --version

      - name: Package
        run: |
          name="gitknown-${GITHUB_REF_NAME}-${{ matrix.os }}-${{ matrix.arch }}"
          tar -czf "${name}.tar.gz" gitknown
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: |
            gitknown-*.tar.gz
            gitknown-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # the flake bump below lands on the branch, not the tagged commit

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/gitknown-*.tar.gz
            artifacts/gitknown-*.tar.gz.sha256
          generate_release_notes: true

      # Point the flake's prebuilt binary-distribution output at this release so
      # `nix run github:denisraison/gitknown` serves it. Version + checksums come
      # straight from the artifacts built above, so the bump is mechanical; we
      # commit it directly to main (no PR: nothing to review on a generated bump,
      # and a GITHUB_TOKEN PR wouldn't trigger CI to gate an auto-merge anyway).
      - name: Track this release in the flake
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          ref = os.environ["GITHUB_REF_NAME"]          # e.g. v0.2.0
          version = ref.removeprefix("v")
          art = pathlib.Path("artifacts")
          shas = {
              arch: (art / f"gitknown-{ref}-{arch}.tar.gz.sha256").read_text().split()[0]
              for arch in ("linux-amd64", "darwin-arm64")
          }
          flake = pathlib.Path("flake.nix")
          s = flake.read_text()
          s, n = re.subn(r'(binVersion = ")[^"]*(")', rf'\g<1>{version}\g<2>', s)
          assert n == 1, f"binVersion: matched {n}, expected 1"
          for arch, sha in shas.items():
              s, n = re.subn(
                  rf'(arch = "{arch}";\s*\n\s*sha256 = ")[0-9a-f]{{64}}(")',
                  rf'\g<1>{sha}\g<2>', s)
              assert n == 1, f"{arch} sha: matched {n}, expected 1"
          flake.write_text(s)
          print(f"flake.nix now tracks {version}: {shas}")
          PY

      - name: Commit the bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          if git diff --cached --quiet; then
            echo "flake already tracks ${GITHUB_REF_NAME}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(flake): point prebuilt output at ${GITHUB_REF_NAME}"
          git push origin HEAD:main
